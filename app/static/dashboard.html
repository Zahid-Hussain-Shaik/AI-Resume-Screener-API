<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ResumeAI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dashboard-container { min-height: 100vh; background: var(--bg-primary); padding: 40px 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .item-info { display: flex; gap: 20px; align-items: center; }
        .item-type { font-size: .7rem; font-weight: 700; text-transform: uppercase; background: rgba(99,102,241,.1); color: var(--accent-light); padding: 4px 10px; border-radius: 50px; }
        .item-score { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
        .delete-btn { color: #ff4d4d; opacity: .6; cursor: pointer; transition: opacity .3s; }
        .delete-btn:hover { opacity: 1; }
        .empty-state { text-align: center; padding: 60px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="container">
            <div class="dashboard-header">
                <div>
                    <h1 class="gradient-text" style="font-size: 2.5rem;">Your Dashboard</h1>
                    <p id="user-welcome">Loading profile...</p>
                </div>
                <div style="display: flex; gap: 15px;">
                    <a href="landing.html" class="btn btn-secondary">New Analysis</a>
                    <button class="btn btn-secondary" id="logout-btn">Logout</button>
                </div>
            </div>

            <div class="history-section">
                <h2 style="margin-bottom: 20px; font-size: 1.2rem;">Previous Scans</h2>
                <div id="history-list" class="history-list">
                    <!-- Items will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        async function init() {
            try {
                // Get Profile
                const profileRes = await fetch('/api/v1/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!profileRes.ok) throw new Error();
                const user = await profileRes.json();
                document.getElementById('user-welcome').textContent = `Welcome back, ${user.full_name || user.email}`;

                // Get History
                loadHistory();
            } catch (err) {
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }
        }

        async function loadHistory() {
            const res = await fetch('/api/v1/history', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const list = document.getElementById('history-list');
            
            if (data.submissions.length === 0) {
                list.innerHTML = '<div class="glass-card empty-state">No scans yet. Start your first analysis!</div>';
                return;
            }

            list.innerHTML = data.submissions.map(item => `
                <div class="glass-card history-item">
                    <div class="item-info">
                        <div class="item-score">${Math.round(item.overall_score)}%</div>
                        <div>
                            <div class="item-type">${item.scan_type}</div>
                            <div style="font-size: .8rem; color: var(--text-muted); margin-top: 4px;">
                                ${new Date(item.created_at).toLocaleDateString()} at ${new Date(item.created_at).toLocaleTimeString()}
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <i data-lucide="trash-2" class="delete-btn" onclick="deleteItem(${item.id})"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function deleteItem(id) {
            if (!confirm("Are you sure you want to delete this scan?")) return;
            const res = await fetch(`/api/v1/history/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) loadHistory();
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'landing.html';
        });

        init();
    </script>
</body>
</html>
