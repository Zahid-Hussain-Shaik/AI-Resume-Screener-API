<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResumeAI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: .85rem; font-weight: 600; color: var(--text-secondary); }
        .form-group input { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text-primary); outline: none; }
        .form-group input:focus { border-color: var(--accent); }
        .auth-footer { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--accent-light); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h1 class="gradient-text" style="font-size: 2rem; margin-bottom: 10px;">Welcome Back</h1>
                <p>Login to your ResumeAI dashboard</p>
            </div>
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary full-width" id="submit-btn">Login</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const form = document.getElementById('login-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = "Logging in...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', email); // FastAPI OAuth2 standard
            formData.append('password', password);

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (!response.ok) throw new Error("Invalid credentials");

                const data = await response.json();
                localStorage.setItem('token', data.access_token);
                
                // Redirect logic
                const params = new URLSearchParams(window.location.search);
                const returnTo = params.get('returnTo');
                window.location.href = returnTo ? returnTo : '/';
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = "Login";
            }
        });
    </script>
</body>
</html>
